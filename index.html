<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CDO Programs and Projects</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .login-container {
    text-align: center;
    max-width: 420px;
    padding: 48px 40px;
    background: #16213e;
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    display: none;
  }
  .login-container h1 {
    font-size: 24px;
    margin-bottom: 8px;
    color: #fff;
  }
  .login-container p {
    font-size: 14px;
    color: #8892b0;
    margin-bottom: 32px;
  }
  .lock-icon {
    font-size: 48px;
    margin-bottom: 20px;
    display: block;
  }
  input[type="password"] {
    width: 100%;
    padding: 14px 16px;
    font-size: 16px;
    border: 2px solid #2a3a5c;
    border-radius: 8px;
    background: #0f1a30;
    color: #fff;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="password"]:focus {
    border-color: #4fc3f7;
  }
  button {
    width: 100%;
    margin-top: 16px;
    padding: 14px;
    font-size: 16px;
    font-weight: 600;
    background: #4fc3f7;
    color: #0f1a30;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s;
  }
  button:hover { background: #81d4fa; }
  .remember {
    margin-top: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 13px;
    color: #8892b0;
  }
  .remember input { accent-color: #4fc3f7; }
  .error {
    color: #ef5350;
    font-size: 14px;
    margin-top: 12px;
    display: none;
  }
</style>
</head>
<body>
<div class="login-container">
  <span class="lock-icon">&#128274;</span>
  <h1>CDO Programs and Projects</h1>
  <p>Enter the password to view the diagram</p>
  <form id="loginForm" onsubmit="return handleSubmit(event)">
    <input type="password" id="pwd" placeholder="Password" autofocus autocomplete="off" />
    <button type="submit">Unlock</button>
    <label class="remember">
      <input type="checkbox" id="rememberMe" checked />
      Remember me on this browser
    </label>
    <div class="error" id="errorMsg">Incorrect password. Please try again.</div>
  </form>
</div>

function b64ToBytes(b64) {
  return Uint8Array.from(atob(b64), c => c.charCodeAt(0));
}

async function decrypt(password) {
  const salt = b64ToBytes(ENCRYPTED.salt);
  const iv = b64ToBytes(ENCRYPTED.iv);
  const ct = b64ToBytes(ENCRYPTED.ct);

  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey(
    "raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]
  );
  const key = await crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: salt, iterations: 600000, hash: "SHA-256" },
    keyMaterial,
    { name: "AES-GCM", length: 256 },
    false,
    ["decrypt"]
  );

  const decrypted = await crypto.subtle.decrypt(
    { name: "AES-GCM", iv: iv }, key, ct
  );
  return new TextDecoder().decode(decrypted);
}

async function handleSubmit(e) {
  e.preventDefault();
  const pwd = document.getElementById("pwd").value;
  const errEl = document.getElementById("errorMsg");
  errEl.style.display = "none";

  try {
    const html = await decrypt(pwd);
    if (document.getElementById("rememberMe").checked) {
      sessionStorage.setItem("cdo_pwd", pwd);
    }
    document.open();
    document.write(html);
    document.close();
  } catch (err) {
    errEl.style.display = "block";
    document.getElementById("pwd").select();
  }
}

(async function autoUnlock() {
  const saved = sessionStorage.getItem("cdo_pwd");
  if (saved) {
    try {
      const html = await decrypt(saved);
      document.open();
      document.write(html);
      document.close();
      return;
    } catch (_) {
      sessionStorage.removeItem("cdo_pwd");
    }
  }
  document.querySelector(".login-container").style.display = "block";
  document.getElementById("pwd").focus();
})();
</script>
